# Strategic TARGET allocation — the illustrative end-state plan for the taxable pool. Drives the Target
# pie in `hn finance allocation` (the Current pie is derived live from holdings). Config-stored judgment:
# the allocation *decision*, synced when the strategy changes (rare), NOT per-fill. Values ~$k; each pie
# self-normalizes to 100%.
allocation_target:
  caption: "~$490k taxable pool · illustrative index-anchored target"
  slices:
    - {label: "Core index (VTI/VXUS/BND)", value: 300}
    - {label: "Single-stock convictions", value: 90}
    - {label: "Legacy ORCL (diluting)", value: 20}
    - {label: "Cash / dry powder", value: 40}

# Dated tax actions — drives the `tax_deadline` pulse flag. Illustrative estimated-tax cadence.
tax_events:
  - {date: 2026-09-15, label: "1040-ES Q3 estimated tax due (illustrative)"}
  - {date: 2027-01-15, label: "1040-ES Q4 estimated tax due (illustrative)"}
