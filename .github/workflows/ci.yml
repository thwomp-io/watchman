name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  # Manual runs let a bundle build be exercised without cutting a tag (the cross-platform bundle lane).
  workflow_dispatch:

# Least privilege by default; the image job opts up to packages:write for GHCR.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Python lane: the hn CLI + all domain lanes ----------------------------------------------
  python:
    name: python (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: ruff
        run: uv run ruff check .
      - name: mypy
        run: uv run mypy
      - name: pytest
        run: uv run pytest -q

  # ---- Windows engine smoke: prove the CLI imports and runs a keyless sample-pack command ---------
  python-windows-smoke:
    name: python (windows smoke)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: import every module
        # Import-time failures (missing platform deps, platform-only modules) surface as a batch.
        run: uv run python scripts/ci_import_walk.py
      - name: engine help
        run: uv run hn --help
      - name: keyless pack run (fictional persona, no API keys)
        run: uv run hn finance networth --pack samples/packs/demo-investor

  # ---- Frontend lane: the desktop console webview (React/TS) -----------------------------------
  frontend:
    name: frontend (tsc · vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bus-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: bus-app/package-lock.json
      - run: npm ci
      - name: tsc
        run: npx tsc --noEmit
      - name: vitest
        run: npm test

  # ---- Rust lane: the Tauri shell (clippy + unit tests; no full app build needed in CI) --------
  rust:
    name: rust (clippy · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bus-app/src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Tauri v2 system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libsoup-3.0-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bus-app/src-tauri
      - name: stage bundled engine
        # The Tauri build script validates bundle.resources at compile time; the app build stages
        # the engine automatically, but bare cargo runs need it staged first.
        run: node ../scripts/stage-engine.mjs
      - name: clippy
        # advisory for now (runs + reports, doesn't gate on warnings); cleaning the pre-existing
        # lints + restoring `-- -D warnings` is a tracked follow-up. `cargo test` still gates.
        run: cargo clippy --all-targets
      - name: test
        run: cargo test

  # ---- Security: the OSS Wiz-analog. Trivy scans the repo (dep CVEs + secrets + misconfig). -----
  security:
    name: security (trivy fs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        # Run Trivy from its official image (no binary-install step — the trivy-action's install.sh
        # was failing on the runner). Auth the DB pull with the repo token to dodge ghcr rate-limits.
        # Fails the stage on a fixable HIGH/CRITICAL — the gate-before-publish.
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/scan" \
            -e TRIVY_USERNAME="${{ github.actor }}" \
            -e TRIVY_PASSWORD="${{ secrets.GITHUB_TOKEN }}" \
            aquasec/trivy:0.65.0 fs \
              --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 --no-progress /scan

  # ---- Desktop bundles: Windows + Linux installers (cross-platform support) ----------------------
  # The slow lane — runs on release tags + manual dispatch only (the rust/frontend jobs already gate
  # correctness on every push; rebuilding installers per-push would burn wall-clock for nothing).
  # Windows: NSIS .exe + WiX .msi (WiX fetched by tauri-cli on the runner). Linux: .deb
  # (same apt dep set the rust job uses). macOS: .dmg (Apple Silicon; macos-latest runners are
  # arm64) — UNSIGNED like the Windows exe, shipped anyway; the README documents the Gatekeeper
  # right-click-Open / remove-quarantine path, the same honesty posture as the SmartScreen note.
  # Notarization + a universal binary are roadmap.
  bundle:
    name: bundle (${{ matrix.platform }})
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [frontend, rust]
    permissions:
      contents: write   # gh release upload (attach installers to the Release page)
    strategy:
      fail-fast: false  # a Windows bundler hiccup shouldn't kill the Linux artifacts, or vice versa
      matrix:
        include:
          - platform: windows
            os: windows-latest
            bundles: "nsis/*.exe msi/*.msi"
            build_args: ""
          - platform: linux
            os: ubuntu-latest
            bundles: "deb/*.deb"
            build_args: "-- --bundles deb"   # deb only — the AppImage isn't shipped
          - platform: macos
            os: macos-latest
            bundles: "dmg/*.dmg"
            build_args: "-- --bundles dmg"
    runs-on: ${{ matrix.os }}
    env:
      # Self-update signing is OPT-IN: a boolean computed from secret presence, because secrets
      # can't be referenced in step `if:` directly. Before the operator generates the updater
      # keypair (docs/UPDATER.md), this is false and the plain unsigned build runs — CI stays green.
      HAS_UPDATER_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
    defaults:
      run:
        working-directory: bus-app
        shell: bash   # one script dialect across both runners (bash ships on windows-latest)
    steps:
      - uses: actions/checkout@v4
      - name: Tauri v2 system deps (linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libsoup-3.0-dev patchelf
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: bus-app/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bus-app/src-tauri
      - run: npm ci
      # Self-update lane (Windows): with the updater signing key configured as a repo secret, build
      # with the release overlay config (createUpdaterArtifacts + the GitHub releases endpoint) so
      # tauri emits the NSIS installer PLUS its minisign .sig. The overlay merges over the base
      # tauri.conf.json, whose updater endpoint list is deliberately empty (dev builds point nowhere).
      - name: tauri build (signed + updater artifacts)
        if: matrix.platform == 'windows' && env.HAS_UPDATER_KEY == 'true'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --config src-tauri/tauri.release.conf.json
      - name: tauri build
        if: matrix.platform != 'windows' || env.HAS_UPDATER_KEY != 'true'
        run: npm run tauri build ${{ matrix.build_args }}
      # Assemble latest.json — the updater endpoint document. tauri-cli emits per-artifact .sig
      # files but (outside tauri-action) no manifest; build it from the versioned installer + its
      # signature. `releases/latest/download/latest.json` is the app's stable check endpoint; the
      # url INSIDE pins the concrete versioned asset it describes.
      - name: Assemble latest.json (updater manifest)
        if: matrix.platform == 'windows' && env.HAS_UPDATER_KEY == 'true' && startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          EXE=$(ls src-tauri/target/release/bundle/nsis/*-setup.exe | head -1)
          SIG="${EXE}.sig"
          test -f "$SIG" || { echo "::error::updater .sig missing next to $EXE"; exit 1; }
          TAG="$TAG" EXE="$EXE" SIG="$SIG" python3 - <<'PY'
          import datetime, json, os
          tag, exe, sig = os.environ["TAG"], os.environ["EXE"], os.environ["SIG"]
          manifest = {
              "version": tag.lstrip("v"),
              "pub_date": datetime.datetime.now(datetime.timezone.utc).isoformat(),
              "platforms": {
                  "windows-x86_64": {
                      "signature": open(sig).read().strip(),
                      "url": (
                          f"https://github.com/{os.environ['GITHUB_REPOSITORY']}"
                          f"/releases/download/{tag}/{os.path.basename(exe)}"
                      ),
                  }
              },
          }
          with open("latest.json", "w") as f:
              json.dump(manifest, f, indent=2)
          print("latest.json ->", manifest["platforms"]["windows-x86_64"]["url"])
          PY
      - name: Collect installers
        # One flat dir regardless of platform; if-no-files-found below turns a bundler path drift
        # into a loud red instead of a silently-empty artifact.
        #
        # Each versioned bundle also gets a copy under a version-stable name, so
        # `releases/latest/download/<name>` links stay permanent across releases.
        run: |
          mkdir -p dist-bundles
          for pat in ${{ matrix.bundles }}; do
            cp src-tauri/target/release/bundle/$pat dist-bundles/ || true
          done
          shopt -s nullglob
          for f in dist-bundles/*-setup.exe; do cp "$f" dist-bundles/Watchman-Setup-x64.exe; done
          for f in dist-bundles/*.msi;       do cp "$f" dist-bundles/Watchman-x64.msi; done
          for f in dist-bundles/*.deb;       do cp "$f" dist-bundles/watchman-amd64.deb; done
          for f in dist-bundles/*.dmg;       do cp "$f" dist-bundles/Watchman-aarch64.dmg; done
          # Updater sidecars ride along when the signed lane ran (the versioned .sig must ship
          # beside the versioned exe; latest.json is the check endpoint).
          for f in src-tauri/target/release/bundle/nsis/*-setup.exe.sig; do cp "$f" dist-bundles/; done
          [ -f latest.json ] && cp latest.json dist-bundles/
          ls -la dist-bundles/
      - uses: actions/upload-artifact@v7
        with:
          name: watchman-${{ matrix.platform }}
          path: bus-app/dist-bundles/*
          if-no-files-found: error
      - name: Attach to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Create the Release if it doesn't exist yet, so installers and the release page always
        # appear together (placeholder notes; curated notes are edited in afterwards).
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release view "$TAG" -R "$GITHUB_REPOSITORY" > /dev/null 2>&1 || \
            gh release create "$TAG" -R "$GITHUB_REPOSITORY" --verify-tag \
              --title "$TAG" --notes "Installers are attached by CI; full notes incoming."
          gh release upload "$TAG" dist-bundles/* --clobber -R "$GITHUB_REPOSITORY"

  # ---- Image: build the headless-engine container, scan + smoke-test it, publish to GHCR --------
  image:
    name: image (build · trivy · smoke · ghcr)
    runs-on: ubuntu-latest
    needs: [python, security]
    permissions:
      contents: read
      packages: write   # push to GHCR (the repo's OWN package — GITHUB_TOKEN suffices, no PAT)
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (load locally for scan + smoke before any push)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy image scan
        # Same install-free approach; mount the docker socket so Trivy can read the just-built local image.
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -e TRIVY_USERNAME="${{ github.actor }}" \
            -e TRIVY_PASSWORD="${{ secrets.GITHUB_TOKEN }}" \
            aquasec/trivy:0.65.0 image \
              --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 --no-progress "${IMAGE}:ci"
      - name: Smoke test (the engine actually runs)
        run: |
          docker run --rm "${IMAGE}:ci" --help
          docker run --rm "${IMAGE}:ci" finance --help
      # Publish only on a release tag or a push to main — never on PRs.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag + push (latest + the SemVer tag)
        if: github.event_name != 'pull_request'
        run: |
          docker tag "${IMAGE}:ci" "${IMAGE}:latest"
          docker push "${IMAGE}:latest"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            docker tag "${IMAGE}:ci" "${IMAGE}:${VERSION}"
            docker push "${IMAGE}:${VERSION}"
          fi
