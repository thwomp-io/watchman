<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Watchman app icon. Noir graphite tile + instrument-amber radar scope (the watchman sweeping
       for signals) + a phosphor blip = a detected signal. Palette matches the app chrome:
       amber #e8a33d, warn-phosphor #ffb454, graphite #08090c..#161a23. macOS squircle tile,
       ~824px artwork inside the 1024 canvas with transparent padding. -->
  <defs>
    <radialGradient id="tile" cx="50%" cy="36%" r="78%">
      <stop offset="0%" stop-color="#1a1f29"/>
      <stop offset="52%" stop-color="#0e1117"/>
      <stop offset="100%" stop-color="#08090c"/>
    </radialGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8a33d" stop-opacity="0"/>
      <stop offset="78%" stop-color="#e8a33d" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#e8a33d" stop-opacity="0.42"/>
    </linearGradient>
    <radialGradient id="blip" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe0a8"/>
      <stop offset="35%" stop-color="#ffb454"/>
      <stop offset="100%" stop-color="#ffb454" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="haze" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <!-- chassis tile -->
  <rect x="100" y="100" width="824" height="824" rx="188" fill="url(#tile)" stroke="#2b3140" stroke-width="3"/>
  <!-- engraved amber bezel hairline -->
  <rect x="118" y="118" width="788" height="788" rx="172" fill="none" stroke="#e8a33d" stroke-opacity="0.13" stroke-width="2"/>

  <g transform="translate(512 512)">
    <!-- concentric instrument rings -->
    <circle r="296" fill="none" stroke="#e8a33d" stroke-opacity="0.20" stroke-width="3"/>
    <circle r="206" fill="none" stroke="#e8a33d" stroke-opacity="0.15" stroke-width="3"/>
    <circle r="116" fill="none" stroke="#e8a33d" stroke-opacity="0.12" stroke-width="3"/>
    <!-- crosshair hairlines -->
    <line x1="-296" y1="0" x2="296" y2="0" stroke="#e8a33d" stroke-opacity="0.09" stroke-width="2"/>
    <line x1="0" y1="-296" x2="0" y2="296" stroke="#e8a33d" stroke-opacity="0.09" stroke-width="2"/>

    <!-- radar sweep wedge (clockwise; bright leading edge up-right) -->
    <g transform="rotate(-42)">
      <path d="M0 0 L296 0 A296 296 0 0 0 247.0 -163.4 Z" fill="url(#sweep)"/>
      <line x1="0" y1="0" x2="296" y2="0" stroke="#f0b352" stroke-opacity="0.85" stroke-width="5" filter="url(#glow)"/>
    </g>

    <!-- detected-signal blip on the outer band, where the sweep points -->
    <circle cx="150" cy="-176" r="74" fill="url(#blip)" opacity="0.85" filter="url(#haze)"/>
    <circle cx="150" cy="-176" r="17" fill="#ffe0a8" filter="url(#glow)"/>

    <!-- center hub -->
    <circle r="15" fill="#f0b352" filter="url(#glow)"/>
  </g>
</svg>
