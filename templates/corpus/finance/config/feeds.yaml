# Packaged news-wire roster — a GENERIC DEFAULT, not a personal media diet (since 2026-07-16).
#
# Resolution precedence (Settings.feeds_path, mirroring the portfolio seed):
#   1. the active weight pack's finance/feeds.yaml (demo scenarios may ship their own);
#   2. a TRACKER-RESIDENT <tracker>/finance/config/feeds.yaml — THE home for a tuned roster
#      (geopolitics picks + thesis-topic searches are corpus data: a media diet is a personal
#      tell, the same class as holdings);
#   3. this packaged default (fresh installs get the broad markets wire out of the box).
#
# Headlines-only is fine (paywalls don't matter for pulse purposes). `category`
# (markets | geopolitics | thesis) drives the News-tab filter chips.
feeds:
  # --- markets wire (broad financial headlines; generic majors) ---
  - name: marketwatch
    category: markets
    url: https://feeds.content.dowjones.io/public/rss/mw_topstories
  - name: cnbc-markets
    category: markets
    url: https://www.cnbc.com/id/100003114/device/rss/rss.html
  - name: ft-home
    category: markets
    url: https://www.ft.com/rss/home/international  # was /rss/home — FT 301'd it
  - name: ap
    category: markets
    url: https://news.google.com/rss/search?q=apnews.com&hl=en-US&gl=US&ceid=US:en  # AP via google-news
      # source-scope. AP's own RSS is a PAID dev-portal API; the `allinurl:apnews.com` operator
      # returns EMPTY in gnews RSS (verified) — plain `q=<domain>` is the working keyless path.
  - name: bloomberg
    category: markets
    url: https://news.google.com/rss/search?q=bloomberg.com&hl=en-US&gl=US&ceid=US:en  # Bloomberg killed
      # public RSS; same google-news source-scope path (verified 4 items, Bloomberg.com-sourced).
  # --- single-name catalyst wire (the "why is it moving" layer). All google-news source-scope
  #     (q=<domain>) — these sources gate/killed direct RSS, same as AP/Bloomberg. ---
  - name: benzinga
    category: markets
    url: https://news.google.com/rss/search?q=benzinga.com&hl=en-US&gl=US&ceid=US:en  # Benzinga gates RSS
      # behind its licensed API; source-scope is the keyless path (verified ~99 items).
  - name: reuters
    category: markets
    url: https://news.google.com/rss/search?q=reuters.com&hl=en-US&gl=US&ceid=US:en  # Reuters killed free
      # RSS; source-scope (verified ~100 items).
  - name: stocktitan
    category: markets
    url: https://news.google.com/rss/search?q=stocktitan.net&hl=en-US&gl=US&ceid=US:en  # single-name
      # catalyst focus (verified ~100 items).
  # --- geopolitics + THESIS-TOPIC layers (examples — tune to YOUR reading + research program in the
  #     tracker-resident copy; google-news rss/search is the keyless mechanism for both) ---
