# Broad-market news wire — aggregated into `watch`/`pulse` and the News tab through the seen-cache.
# Headlines-only is fine (paywalls don't matter for headline scanning). Tailor freely.
#
# `category` (markets | geopolitics | thesis) drives the News-tab filter chips. The `thesis` layer is
# where you tune google-news search topics to whatever you're actively researching — the two generic
# examples below show the shape; add your own topic feeds to match your book.
#
# Note on google-news source-scoping: several outlets (AP, Bloomberg, Reuters, Benzinga) gate or killed
# their free RSS, so the working keyless path is a google-news search scoped to the domain
# (`q=<domain>`) rather than the outlet's own (dead/paywalled) feed.
feeds:
  # --- markets wire (broad financial headlines) ---
  - name: marketwatch
    category: markets
    url: https://feeds.content.dowjones.io/public/rss/mw_topstories
  - name: cnbc-markets
    category: markets
    url: https://www.cnbc.com/id/100003114/device/rss/rss.html
  - name: ft-home
    category: markets
    url: https://www.ft.com/rss/home/international
  - name: ap
    category: markets
    url: https://news.google.com/rss/search?q=apnews.com&hl=en-US&gl=US&ceid=US:en
  - name: bloomberg
    category: markets
    url: https://news.google.com/rss/search?q=bloomberg.com&hl=en-US&gl=US&ceid=US:en
  - name: reuters
    category: markets
    url: https://news.google.com/rss/search?q=reuters.com&hl=en-US&gl=US&ceid=US:en
  - name: benzinga
    category: markets
    url: https://news.google.com/rss/search?q=benzinga.com&hl=en-US&gl=US&ceid=US:en
  - name: stocktitan
    category: markets
    url: https://news.google.com/rss/search?q=stocktitan.net&hl=en-US&gl=US&ceid=US:en
  # --- geopolitics (macro-relevant world coverage) ---
  - name: aljazeera
    category: geopolitics
    url: https://www.aljazeera.com/xml/rss/all.xml
  # --- thesis-topic layer (google-news search — tune these to your active research program) ---
  - name: topic-macro-rates
    category: thesis
    url: https://news.google.com/rss/search?q=Federal%20Reserve%20interest%20rates%20inflation&hl=en-US&gl=US&ceid=US:en
  - name: topic-semiconductors
    category: thesis
    url: https://news.google.com/rss/search?q=semiconductor%20supply%20chain&hl=en-US&gl=US&ceid=US:en
