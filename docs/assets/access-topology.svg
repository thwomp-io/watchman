<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 647.9 455" width="647.9" height="455" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect width="647.9" height="455" fill="#08090c"></rect><text x="30" y="32" font-size="20" font-weight="700" fill="#f4f6fb">One server, many consoles</text><text x="30" y="54" font-size="12.5" fill="#aab2c2">An always-on node serves the same console to every device you own.</text><defs><marker id="flow-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#aab2c2"></path></marker><marker id="flow-arrow-fb" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6b7382"></path></marker><linearGradient id="flow-grad-0" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8a33d" stop-opacity="0.2"></stop><stop offset="100%" stop-color="#e8a33d" stop-opacity="0.03"></stop></linearGradient><filter id="flow-glow-0" x="-45%" y="-45%" width="190%" height="190%"><feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#e8a33d" flood-opacity="0.6"></feDropShadow></filter><linearGradient id="flow-grad-1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7dd6a0" stop-opacity="0.2"></stop><stop offset="100%" stop-color="#7dd6a0" stop-opacity="0.03"></stop></linearGradient><filter id="flow-glow-1" x="-45%" y="-45%" width="190%" height="190%"><feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#7dd6a0" flood-opacity="0.6"></feDropShadow></filter><linearGradient id="flow-grad-2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#59b9ff" stop-opacity="0.2"></stop><stop offset="100%" stop-color="#59b9ff" stop-opacity="0.03"></stop></linearGradient><filter id="flow-glow-2" x="-45%" y="-45%" width="190%" height="190%"><feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#59b9ff" flood-opacity="0.6"></feDropShadow></filter><linearGradient id="flow-grad-3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c792ea" stop-opacity="0.2"></stop><stop offset="100%" stop-color="#c792ea" stop-opacity="0.03"></stop></linearGradient><filter id="flow-glow-3" x="-45%" y="-45%" width="190%" height="190%"><feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#c792ea" flood-opacity="0.6"></feDropShadow></filter></defs><line x1="230" y1="248.5" x2="414.9" y2="125.5" stroke="#aab2c2" stroke-width="2" marker-end="url(#flow-arrow)"></line><text x="323.95" y="178" text-anchor="middle" font-size="11" font-weight="600" font-style="normal" stroke="#08090c" stroke-width="3.5" fill="none">local — no server needed</text><text x="323.95" y="178" text-anchor="middle" font-size="11" font-weight="600" font-style="normal" fill="#ffffff">local — no server needed</text><line x1="230" y1="248.5" x2="414.9" y2="248.5" stroke="#aab2c2" stroke-width="2" marker-end="url(#flow-arrow)"></line><text x="323.95" y="239.5" text-anchor="middle" font-size="11" font-weight="600" font-style="normal" stroke="#08090c" stroke-width="3.5" fill="none">UI + read-only RPC · token</text><text x="323.95" y="239.5" text-anchor="middle" font-size="11" font-weight="600" font-style="normal" fill="#ffffff">UI + read-only RPC · token</text><line x1="230" y1="248.5" x2="414.9" y2="371.5" stroke="#aab2c2" stroke-width="2" marker-end="url(#flow-arrow)"></line><text x="323.95" y="301" text-anchor="middle" font-size="11" font-weight="600" font-style="normal" stroke="#08090c" stroke-width="3.5" fill="none">bus over HTTP · token</text><text x="323.95" y="301" text-anchor="middle" font-size="11" font-weight="600" font-style="normal" fill="#ffffff">bus over HTTP · token</text><g transform="translate(30,201)"><rect width="200" height="95" rx="13" fill="#10131a" stroke="#e8a33d" stroke-width="1.8" filter="url(#flow-glow-0)"></rect><rect width="200" height="95" rx="13" fill="url(#flow-grad-0)"></rect><text x="100" y="30" text-anchor="middle" font-size="15.5" font-weight="800" letter-spacing="0.2" fill="#e8a33d">Always-on node</text><text x="100" y="48" text-anchor="middle" font-size="11" fill="#aab2c2">your machine, your corpus</text><text x="100" y="63" text-anchor="middle" font-size="11" fill="#aab2c2">hn engine + standing agents</text><text x="100" y="78" text-anchor="middle" font-size="11" fill="#aab2c2">bus server :8787 — one token</text></g><g transform="translate(417.9,78)"><rect width="200" height="95" rx="13" fill="#10131a" stroke="#7dd6a0" stroke-width="1.8" filter="url(#flow-glow-1)"></rect><rect width="200" height="95" rx="13" fill="url(#flow-grad-1)"></rect><text x="100" y="30" text-anchor="middle" font-size="15.5" font-weight="800" letter-spacing="0.2" fill="#7dd6a0">Desktop console</text><text x="100" y="48" text-anchor="middle" font-size="11" fill="#aab2c2">native app on the node</text><text x="100" y="63" text-anchor="middle" font-size="11" fill="#aab2c2">reads the bus + corpus directly</text></g><g transform="translate(417.9,201)"><rect width="200" height="95" rx="13" fill="#10131a" stroke="#59b9ff" stroke-width="1.8" filter="url(#flow-glow-2)"></rect><rect width="200" height="95" rx="13" fill="url(#flow-grad-2)"></rect><text x="100" y="30" text-anchor="middle" font-size="15.5" font-weight="800" letter-spacing="0.2" fill="#59b9ff">Browser · phone</text><text x="100" y="48" text-anchor="middle" font-size="11" fill="#aab2c2">the served web console</text><text x="100" y="63" text-anchor="middle" font-size="11" fill="#aab2c2">PWA-installable</text></g><g transform="translate(417.9,324)"><rect width="200" height="95" rx="13" fill="#10131a" stroke="#c792ea" stroke-width="1.8" filter="url(#flow-glow-3)"></rect><rect width="200" height="95" rx="13" fill="url(#flow-grad-3)"></rect><text x="100" y="30" text-anchor="middle" font-size="15.5" font-weight="800" letter-spacing="0.2" fill="#c792ea">Satellite desktop</text><text x="100" y="48" text-anchor="middle" font-size="11" fill="#aab2c2">native app in remote mode</text><text x="100" y="63" text-anchor="middle" font-size="11" fill="#aab2c2">notifications off the served bus</text></g></svg>
